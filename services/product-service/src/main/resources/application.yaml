spring:
  application:
    name: product-service
  config:
    import: optional:file:/app/.env
  datasource:
    url: ${PRODUCT_DB_URL:jdbc:postgresql://postgres:5432/product_db}
    username: ${PRODUCT_DB_USER:product_db}
    password: ${PRODUCT_DB_PASSWORD:product_db}

  sql:
    init:
      mode: always

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  jpa:
    defer-datasource-initialization: true
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

ollama:
  ai:
    chat-url: ${OLLAMA_CHAT_URL:http://ai-engine-gpu:11434}
    cpu-url: ${OLLAMA_CPU_URL:http://ai-engine-cpu:11434}
    embedding:
      model: ${OLLAMA_EMBEDDING_MODEL:hf.co/doof-ferb/AITeamVN-Vietnamese_Embedding-gguf:Q8_0}
    intent:
      model: ${OLLAMA_INTENT_MODEL:qwen2.5:0.5b-instruct}
    chat:
      model: ${OLLAMA_CHAT_MODEL:qwen2.5:3b-instruct}

server:
  port: 8082
  error:
    include-message: always

aws:
  region: ${AWS_REGION}
  access:
    key: ${AWS_ACCESS_KEY}
  secret:
    key: ${AWS_SECRET_KEY}
  s3:
    bucket: ${AWS_S3_BUCKET:bms.image}
