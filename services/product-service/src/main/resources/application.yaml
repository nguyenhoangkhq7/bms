spring:
  application:
    name: product-service

  datasource:
    url: jdbc:postgresql://postgres:5432/product_db
    username: product_db
    password: product_db

  sql:
    init:
      mode: always

  jpa:
    defer-datasource-initialization: true
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: 
              - "http://localhost:5173"
              - "http://localhost:3000"
              - "http://localhost:3001"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS # Bắt buộc phải có để xử lý preflight request
            allowedHeaders: "*"
            allowCredentials: true

server:
  port: 8082

