spring:
  application:
    name: product-service
  datasource:
    url: ${PRODUCT_DB_URL:jdbc:postgresql://postgres:5432/product_db}
    username: ${PRODUCT_DB_USER:product_db}
    password: ${PRODUCT_DB_PASSWORD:product_db}
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true

flyway:
  enabled: true
  baseline-on-migrate: true

server:
  port: 8081
