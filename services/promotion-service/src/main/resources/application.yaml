spring:
  datasource:
    # 'postgres' là tên service database trong docker-compose.yml
    url: jdbc:postgresql://postgres:5432/promotion_db 
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: 8084