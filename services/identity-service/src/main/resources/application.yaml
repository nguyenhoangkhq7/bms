spring:
  application:
    name: identity-service
  datasource:
    url: ${IDENTITY_DB_URL:jdbc:postgresql://postgres:5432/identity_db}
    username: ${IDENTITY_DB_USER:identity_db}
    password: ${IDENTITY_DB_PASSWORD:identity_db}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/identity_db}
    user: ${SPRING_DATASOURCE_USERNAME:identity_db}
    password: ${SPRING_DATASOURCE_PASSWORD:identity_db}
    baseline-on-migrate: true
    locations: classpath:db/migration
  jwt:
    secret: jumcRJ6yoVkOhtpMkiAOdC8jY5/ATCbeDAI5Taw/eQ8=
    accessTokenExpiration: 7200
    refreshTokenExpiration: 604800
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

aws:
  access:
    key: ${AWS_ACCESS_KEY}
  secret:
    key: ${AWS_SECRET_KEY}
  region: ${AWS_REGION:ap-southeast-1}
  s3:
    bucket: ${AWS_S3_BUCKET}

server:
  port: 8080
  servlet:
    context-path: /
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
