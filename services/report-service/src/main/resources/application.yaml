spring:
  application:
    name: report-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:${REPORT_DB_URL:jdbc:postgresql://postgres:5432/report_db}}
    username: ${SPRING_DATASOURCE_USERNAME:${REPORT_DB_USER:report_db}}
    password: ${SPRING_DATASOURCE_PASSWORD:${REPORT_DB_PASSWORD:report_db}}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    baseline-on-migrate: true
  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:rabbitmq}
    port: ${SPRING_RABBITMQ_PORT:5672}
    username: ${SPRING_RABBITMQ_USERNAME:guest}
    password: ${SPRING_RABBITMQ_PASSWORD:guest}
    listener:
      simple:
        acknowledge-mode: manual
        prefetch: 10

server:
  port: 8085

app:
  order-service-url: ${ORDER_SERVICE_URL:http://order-service:8083}
