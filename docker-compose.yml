services:
  postgres:
    image: "postgres:${POSTGRES_VERSION:-16}"
    container_name: bookstore-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: defaultdb
      POSTGRES_MULTIPLE_DATABASES: "identity_db,product_db,order_db,promotion_db,report_db"
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
    networks:
      - bookstore-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d defaultdb"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M

  identity-service:
    build:
      context: ./services/identity-service
      dockerfile: Dockerfile
    image: "${IDENTITY_SERVICE_IMAGE:-identity-service:latest}"
    container_name: identity-service
    restart: on-failure
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 768M
        reservations:
          memory: 512M
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/identity_db
      - SPRING_DATASOURCE_USERNAME=identity_db
      - SPRING_DATASOURCE_PASSWORD=identity_db
      - MAIL_USERNAME=${MAIL_USERNAME}
      - MAIL_PASSWORD=${MAIL_PASSWORD}
      - AWS_ACCESS_KEY=${AWS_ACCESS_KEY}
      - AWS_SECRET_KEY=${AWS_SECRET_KEY}
      - AWS_REGION=${AWS_REGION}
      - AWS_S3_BUCKET=${AWS_S3_BUCKET}
    networks:
      - bookstore-network

  product-service:
    build:
      context: ./services/product-service
      dockerfile: Dockerfile
    image: "${PRODUCT_SERVICE_IMAGE:-product-service:latest}"
    container_name: product-service
    restart: on-failure
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 768M
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/product_db
      - SPRING_DATASOURCE_USERNAME=product_db
      - SPRING_DATASOURCE_PASSWORD=product_db
      - AWS_ACCESS_KEY=${AWS_ACCESS_KEY}
      - AWS_SECRET_KEY=${AWS_SECRET_KEY}
      - AWS_REGION=${AWS_REGION}
      - AWS_S3_BUCKET=${AWS_S3_BUCKET}
    networks:
      - bookstore-network

  order-service:
    build:
      context: ./services/order-service
      dockerfile: Dockerfile
    image: "${ORDER_SERVICE_IMAGE:-order-service:latest}"
    container_name: order-service
    restart: on-failure
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 768M
    environment:
      - "ORDER_DB_URL=${ORDER_DB_URL:-jdbc:postgresql://postgres:5432/order_db}"
      - ORDER_DB_USER=${ORDER_DB_USER:-order_db}
      - ORDER_DB_PASSWORD=${ORDER_DB_PASSWORD:-order_db}
    networks:
      - bookstore-network

  promotion-service:
    build:
      context: ./services/promotion-service
      dockerfile: Dockerfile
    image: "${PROMOTION_SERVICE_IMAGE:-promotion-service:latest}"
    container_name: promotion-service
    restart: on-failure
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 768M
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/promotion_db
      - SPRING_DATASOURCE_USERNAME=promotion_db
      - SPRING_DATASOURCE_PASSWORD=promotion_db
    networks:
      - bookstore-network

  report-service:
    build:
      context: ./services/report-service
      dockerfile: Dockerfile
    image: "${REPORT_SERVICE_IMAGE:-report-service:latest}"
    container_name: report-service
    restart: on-failure
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 768M
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/report_db
      - SPRING_DATASOURCE_USERNAME=report_db
      - SPRING_DATASOURCE_PASSWORD=report_db
    networks:
      - bookstore-network

  web-app:
    build:
      context: ./apps/web-app
      dockerfile: Dockerfile
    image: "${WEB_APP_IMAGE:-web-app:latest}"
    container_name: web-app
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
    environment:
      - NODE_ENV=production
      - HOSTNAME=0.0.0.0
      - BACKEND_API_BASE_URL=http://order-service:8083
    depends_on:
      - order-service
    ports:
      - "3000:3000"
    networks:
      - bookstore-network

  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    image: "${GATEWAY_IMAGE:-gateway:latest}"
    container_name: gateway
    restart: unless-stopped
    ports:
      - "${GATEWAY_PORT:-80}:80"
    depends_on:
      - identity-service
      - product-service
      - order-service
      - promotion-service
      - report-service
      - web-app
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - bookstore-network

volumes:
  postgres_data:
    driver: local

networks:
  bookstore-network:
    name: bookstore-network
    driver: bridge
