worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    # IP-based rate limiting for Cart API: 5 requests/second
    limit_req_zone $binary_remote_addr zone=cart_ip_limit:10m rate=5r/s;

    server {
        listen       80;
        server_name  localhost;
        error_page 429 = @cart_rate_limited;

        # Proxy Headers (Nên để ở cấp server để áp dụng cho tất cả location)
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;

        # Chuyển tiếp các API
        location /api/v1/identity/ {
            proxy_pass http://identity-service:8081;
        }

        location /api/v1/products/ {
            proxy_pass http://product-service:8082/;
        }

        location /api/v1/orders/cart/ {
            limit_req zone=cart_ip_limit burst=10 nodelay;
            limit_req_status 429;
            proxy_pass http://order-service:8083/cart/;
        }

        location @cart_rate_limited {
            add_header Retry-After 1 always;
            add_header Content-Type application/json always;
            return 429 '{"message":"Too many requests","data":null}';
        }

        location /api/v1/orders/ {
            proxy_pass http://order-service:8083/;
        }

        location /api/v1/promotions/ {
            proxy_pass http://promotion-service:8084;
        }

        location /api/v1/reports/ {
            proxy_pass http://report-service:8085;
        }

        # Route mặc định cho Web App và xử lý CORS tại đây
        location / {
            # --- BẮT ĐẦU CẤU HÌNH CORS ---
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE, PATCH' always;
            add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;
            add_header 'Access-Control-Expose-Headers' 'Content-Length,Content-Range' always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;

            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' 'http://localhost:5173' always;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE, PATCH';
                add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization';
                add_header 'Access-Control-Max-Age' 1728000;
                add_header 'Access-Control-Allow-Credentials' 'true' always;
                add_header 'Content-Type' 'text/plain; charset=utf-8';
                add_header 'Content-Length' 0;
                return 204;
            }
            # --- KẾT THÚC CẤU HÌNH CORS ---

            proxy_pass http://web-app:3000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
