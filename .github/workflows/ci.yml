name: BMS CI Pipeline

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]

jobs:
  build-backend-services:
    name: Build Spring Boot Services
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          [
            identity-service,
            product-service,
            order-service,
            promotion-service,
            report-service,
          ]
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      - name: Build with Maven
        run: |
          cd services/${{ matrix.service }}
          chmod +x mvnw
          ./mvnw clean package -DskipTests

  build-web-app:
    name: Build Next.js Web App
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/web-app/package-lock.json

      - name: Install dependencies & Build
        run: |
          cd apps/web-app
          npm ci
          npm run build

  validate-docker-compose:
    name: Validate Docker Compose
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Test compose file syntax
        run: docker compose config
